<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JB's Wordle</title>
    <link rel="stylesheet" href="format.css">
</head>

<body>


<h3 id="top_header">JB's Wordle (づ｡◕‿‿◕｡)づ</h3>


<div class="game_container">
    <div class="tile" id="00"> </div>
    <div class="tile" id="01"> </div>
    <div class="tile" id="02"> </div>
    <div class="tile" id="03"> </div>
    <div class="tile" id="04"> </div>


    <p class="clear-floats"> </p>
</div>

<div class="game_container">
    <div class="tile" id="10"> </div>
    <div class="tile" id="11"> </div>
    <div class="tile" id="12"> </div>
    <div class="tile" id="13"> </div>
    <div class="tile" id="14"> </div>
    <p class="clear-floats"> </p>
</div>

<div class="game_container">
    <div class="tile" id="20"> </div>
    <div class="tile" id="21"> </div>
    <div class="tile" id="22"> </div>
    <div class="tile" id="23"> </div>
    <div class="tile" id="24"> </div>
    <p class="clear-floats"> </p>
</div>

<div class="game_container">
    <div class="tile" id="30"> </div>
    <div class="tile" id="31"> </div>
    <div class="tile" id="32"> </div>
    <div class="tile" id="33"> </div>
    <div class="tile" id="34"> </div>
    <p class="clear-floats"> </p>
</div>


<div class="game_container">
    <div class="tile" id="40"> </div>
    <div class="tile" id="41"> </div>
    <div class="tile" id="42"> </div>
    <div class="tile" id="43"> </div>
    <div class="tile" id="44"> </div>
    <p class="clear-floats"> </p>
</div>


<div class="game_container">
    <div class="tile" id="50"> </div>
    <div class="tile" id="51"> </div>
    <div class="tile" id="52"> </div>
    <div class="tile" id="53"> </div>
    <div class="tile" id="54"> </div>
    <p class="clear-floats"> </p>
</div>


<div class="game_container">
    <div class="key_input" id="Q">Q</div>
    <div class="key_input" id="W">W</div>
    <div class="key_input" id="E">E</div>
    <div class="key_input" id="R">R</div>
    <div class="key_input" id="T">T</div>
    <div class="key_input" id="Y">Y</div>
    <div class="key_input" id="U">U</div>
    <div class="key_input" id="I">I</div>
    <div class="key_input" id="O">O</div>
    <div class="key_input" id="P">P</div>
    <p class="clear-floats"> </p>
</div>

<div class="game_container">
    <div class="key_input" id="A">A</div>
    <div class="key_input" id="S">S</div>
    <div class="key_input" id="D">D</div>
    <div class="key_input" id="F">F</div>
    <div class="key_input" id="G">G</div>
    <div class="key_input" id="H">H</div>
    <div class="key_input" id="J">J</div>
    <div class="key_input" id="K">K</div>
    <div class="key_input" id="L">L</div>
    <p class="clear-floats"> </p>
</div>

<div class="game_container">
    <div class="large_key_input">ENTER</div>
    <div class="key_input" id="Z">Z</div>
    <div class="key_input" id="X">X</div>
    <div class="key_input" id="C">C</div>
    <div class="key_input" id="V">V</div>
    <div class="key_input" id="B">B</div>
    <div class="key_input" id="N">N</div>
    <div class="key_input" id="M">M</div>
    <div class="large_key_input"><==</div>
    <p class="clear-floats"> </p>
</div>

<div id="result"></div>

<div id="game_controls">
    <label for="length">LENGTH:</label>

    <select name="length" id="length">
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5" >5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
    </select>

    <label for="difficulty">DIFFICULTY:</label>

    <select name="difficulty" id="difficulty">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6" >6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
    </select>

    <button id="apply_options_button">APPLY</button>
</div>





<script src="WordleScript.js"></script>
</body>

<!-- woo -->



</html>
